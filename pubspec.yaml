name: generate_assets
description: CLI tool to generate Dart asset constants from Flutter's pubspec.yaml, with unused asset detection and batch deletion.
version: 0.1.0
repository: https://github.com/ceeyang/generate_assets

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.5.0
  path: ^1.9.0
  yaml: ^3.1.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
