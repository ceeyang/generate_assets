name: generate_assets
description: >-
  A CLI tool that generates Dart asset constants from your Flutter project's
  pubspec.yaml. Supports unused asset detection and batch deletion of unused
  files including 2x/3x resolution variants.
version: 0.1.0
repository: https://github.com/ceeyang/generate_assets
topics:
  - flutter
  - assets
  - codegen
  - cli

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.5.0
  path: ^1.9.0
  yaml: ^3.1.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
