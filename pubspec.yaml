name: generate_assets
description: >-
  CLI tool that generates Dart asset constants from Flutter pubspec.yaml,
  with unused asset detection and batch deletion of 2x/3x variants.
version: 0.3.1
repository: https://github.com/ceeyang/generate_assets
topics:
  - flutter
  - assets
  - codegen
  - cli

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.5.0
  path: ^1.9.0
  yaml: ^3.1.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
